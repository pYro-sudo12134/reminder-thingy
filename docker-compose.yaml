version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    networks:
      - reminder-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  nlp-service:
    build:
      context: ./nlp
      dockerfile: Dockerfile
    image: pyrodocker1/reminder-nlp-ollama:1.1
    container_name: nlp-service
    ports:
      - "50051:50051"
    environment:
      - NLP_MODE=ollama-rag
      - LOG_LEVEL=INFO
      - GRPC_PORT=50051
      - GRPC_WORKERS=10
      - MODEL_VERSION=3.1.0-ollama-rag
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=llama3.2:latest
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-localstack}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT:-4510}
      - OPENSEARCH_USE_SSL=false
      - OPENSEARCH_DISABLE_SSL_VERIFICATION=true
      - OPENSEARCH_USER=${OPENSEARCH_USER:-admin}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - OPENSEARCH_INDEX=reminder_formats
      - RAG_TOP_K=5
      - RAG_MIN_SCORE=0.3
      - RAG_SAVE_CONFIDENCE=0.8
      - EMBEDDING_DIMENSION=768
      - NLP_GRPC_API_KEY=${NLP_GRPC_API_KEY}
    volumes:
      - "./nlp/models:/app/models"
      - "./nlp/data:/app/data"
      - "./secrets:/run/secrets:ro"
    networks:
      - reminder-network
    depends_on:
      ollama:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  localstack:
    image: localstack/localstack:4.12
    container_name: localstack
    ports:
      - "4566:4566"
      - "4510:4510"
      - "4510-4559:4510-4559"
      - "9200:9200"
    env_file:
      - .env
    environment:
      - SERVICES=lambda,s3,events,opensearch,ses,transcribe,sns,sqs,iam,cloudformation,cloudwatch,logs,eventbridge,secretsmanager,secretsmanager_v2,acm,apigateway,route53
      - DEBUG=1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PERSISTENCE=1
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - EDGE_PORT=4566
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_TOKEN}
      - LOCALSTACK_API_KEY=${LOCALSTACK_API_KEY:-}
      - LAMBDA_API_KEY=${LAMBDA_API_KEY}
      - OPENSEARCH_ENDPOINT_STRATEGY=port
      - OPENSEARCH_PORT=4510
      - OPENSEARCH_HOST=0.0.0.0
      - OPENSEARCH_PORT_EXTERNAL=4510
      - OPENSEARCH_HTTPS_PORT=4510
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m -Des.path.data=/tmp/opensearch_data -Des.path.logs=/tmp/opensearch_logs
      - OPENSEARCH_ENABLE_SECURITY=false
      - OPENSEARCH_ENABLE_SSL=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - OPENSEARCH_PLUGINS_LIST=opensearch-security
      - DISABLE_OPENSEARCH_SECURITY_PLUGIN=false
      - OPENSEARCH_NODE_TO_NODE_ENCRYPTION=true
      - OPENSEARCH_SSL_CERTIFICATE_PATH=/etc/localstack/opensearch/certs/node.pem
      - OPENSEARCH_SSL_KEY_PATH=/etc/localstack/opensearch/certs/node-key.pem
      - OPENSEARCH_ROOT_CA_PATH=/etc/localstack/opensearch/certs/root-ca.pem
      - OPENSEARCH_ADMIN_CERTIFICATE_PATH=/etc/localstack/opensearch/certs/admin.pem
      - OPENSEARCH_ADMIN_KEY_PATH=/etc/localstack/opensearch/certs/admin-key.pem
      - INIT_SCRIPTS_PATH=/etc/localstack/init/ready.d/
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack_data:/var/lib/localstack"
      - "./aws-init.sh:/etc/localstack/init/ready.d/init.sh:rw"
      - "./template.yaml:/etc/localstack/init/ready.d/template.yaml"
      - "./metrics-config.yaml:/etc/localstack/init/ready.d/metrics-config.yaml"
      - "./route53.yaml:/etc/localstack/init/ready.d/route53.yaml"
      - "./opensearch_certs:/etc/localstack/opensearch/certs:ro"
      - "./secrets:/run/secrets:ro"
      - ".:/project"
    mem_reservation: 2g
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -s -k http://localhost:4510/ > /dev/null"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - reminder-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres-reminder
    restart: unless-stopped
    environment:
      POSTGRES_DB: voice_reminder
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --encoding=UTF8"
      POSTGRES_INITDB_WALDIR: /var/lib/postgresql/pg_wal
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
      - ./secrets:/run/secrets:ro
    networks:
      - reminder-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d voice_reminder" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres 
      -c max_connections=200 
      -c shared_buffers=256MB 
      -c effective_cache_size=1GB 
      -c maintenance_work_mem=64MB 
      -c checkpoint_completion_target=0.9 
      -c wal_buffers=16MB 
      -c default_statistics_target=100
      -c random_page_cost=1.1 
      -c effective_io_concurrency=200 

  redis:
    image: redis:7-alpine
    container_name: redis-reminder
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "6380:6380"
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - "${REDIS_PASSWORD}"
    volumes:
      - "./redis/config/redis.conf:/usr/local/etc/redis/redis.conf:ro"
      - "./redis/certs:/usr/local/etc/redis/certs:ro"
    networks:
      - reminder-network
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/usr/local/etc/redis/certs/root-ca.pem", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  reminder-app:
    build:
      context: .
      dockerfile: Dockerfile
    #image: pyrodocker1/reminder-backend:1.1-2
    container_name: reminder-app
    ports:
      - "8090:8090"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
      - ENVIRONMENT_NAME=dev
      - USE_LOCAL_SECRETS=true
      - SECRETS_PATH=/run/secrets
      - JAVA_OPTS=-Dfile.encoding=UTF-8 -Dconsole.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Xmx512m -Xms256m
      - OPENSEARCH_HOST=localstack
      - OPENSEARCH_PORT=4510
      - OPENSEARCH_HTTPS_PORT=4510
      - OPENSEARCH_USER=
      - OPENSEARCH_ADMIN_PASSWORD=
      - OPENSEARCH_USE_SSL=false
      - OPENSEARCH_SSL_VERIFICATION_MODE=none
      - OPENSEARCH_TRUSTSTORE_PATH=/app/certs/truststore.jks
      - OPENSEARCH_TRUSTSTORE_PASSWORD=changeit
      - NLP_SERVICE_HOST=nlp-service
      - NLP_SERVICE_PORT=50051
      - NLP_GRPC_API_KEY=${NLP_GRPC_API_KEY}
      - LAMBDA_API_KEY=${LAMBDA_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_BOT_USERNAME=voice_reminder_dev_bot
      - EMAIL_LAMBDA_SEND_REMINDER_ARN=arn:aws:lambda:us-east-1:000000000000:function:send-reminder-email
      - TELEGRAM_LAMBDA_SEND_REMINDER_ARN=arn:aws:lambda:us-east-1:000000000000:function:send-reminder-telegram
      - GRPC_USE_TLS=false
      - WS_PORT=8090
      - DB_ENABLED=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=voice_reminder
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_SCHEMA=voice_schema
      - DB_POOL_SIZE=10
      - DB_POOL_MIN_IDLE=5
      - FLYWAY_ENABLED=true
      - FLYWAY_BASELINE_VERSION=1
      - FLYWAY_LOCATIONS=classpath:db/migration
      - JPA_DDL_GENERATION=none
      - JPA_SHOW_SQL=false
      - SECRET_KEY=${SECRET_KEY}
      - TOKEN_EXPIRATION=${TOKEN_EXPIRATION:-86400000}
      - ISSUER=${ISSUER:-voice-reminder-app}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8090}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-losik2006@gmail.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL:-losik2006@gmail.com}
      - CORS_ALLOWED_ORIGINS=http://localhost:3015
      - CORS_ALLOWED_METHODS=GET, POST, PUT, DELETE, OPTIONS
      - CORS_ALLOWED_HEADERS=Origin, X-Requested-With, Content-Type, Accept, Authorization
      - CORS_MAX_AGE=3600
      - CORS_ALLOW_CREDENTIALS=true
      - SMTP_SSL=${SMTP_SSL:-false}
      - SMTP_TLS=${SMTP_TLS:-true}
      - SMTP_AUTH=${SMTP_AUTH:-true}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-true}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TIMEOUT=5000
      - REDIS_MAX_TOTAL=50
      - REDIS_MAX_IDLE=10
      - REDIS_MIN_IDLE=5
      - REDIS_USE_SSL=true
      - REDIS_SSL_TRUSTSTORE_PASSWORD=changeit
      - REDIS_SSL_KEYSTORE_PASSWORD=changeit
      - REDIS_SSL_TRUSTSTORE_PATH=/app/redis_certs/redis_truststore.jks
      - REDIS_SSL_KEYSTORE_PATH=/app/redis_certs/redis_keystore.jks
      - REDIS_SSL_VERIFY_MODE=full
      - REDIS_SSL_PROTOCOL=TLSv1.2
      - REDIS_SSL_ENABLED_PROTOCOLS=TLSv1.2,TLSv1.3
      - REDIS_SSL_CIPHER_SUITES=TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_AES_128_GCM_SHA256
    volumes:
      - "./web:/app/web"
      - "./secrets/secrets.json:/app/secrets/secrets.json:ro"
      - "./secrets/application.properties:/app/config/application.properties:ro"
      - "./opensearch_certs:/app/certs:ro"
      - "./db/migration:/app/db/migration:ro"
      - "./redis/certs:/app/redis_certs:ro"
      - "./secrets/redis_password.txt:/run/secrets/redis_password:ro"
      - "./secrets/jwt_secret.txt:/run/secrets/jwt_secret:ro"
    networks:
      - reminder-network
    depends_on:
      nlp-service:
        condition: service_healthy
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/test"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

  dlq-processor:
    build:
      context: ./dlq-processor
      dockerfile: Dockerfile
    image: pyrodocker1/reminder-dlq-processor:1.0
    container_name: dlq-processor
    ports:
      - "8085:8085"
    restart: unless-stopped
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ACCOUNT_ID=000000000000
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
      - ENVIRONMENT_NAME=dev
      - USE_LOCAL_SECRETS=true
      - SECRETS_PATH=/run/secrets
      - JAVA_OPTS=-Dfile.encoding=UTF-8 -Dconsole.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Xmx256m -Xms128m
      - DLQ_URL=http://localstack:4566/000000000000/dev-reminder-dlq
      - QUEUE_SUFFIX=-reminder-dlq
      - VISIBILITY_TIMEOUT=60
      - MAX_BATCH_SIZE=10
      - NOTIFY_AFTER_ATTEMPTS=3
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=${SMTP_MAIL:-losik2006@gmail.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-changeit}
      - FROM_EMAIL=${SMTP_MAIL:-losik2006@gmail.com}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-losik2006@gmail.com}
      - SMTP_AUTH=true
      - SMTP_STARTTLS=true
      - METRICS_ENABLED=true
      - CLOUDWATCH_NAMESPACE=Reminder/DLQ
    networks:
      - reminder-network
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: reminder-telegram-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - API_BASE_URL=http://reminder-app:8090
    networks:
      - reminder-network
    depends_on:
      - reminder-app
    healthcheck:
      test: [ "CMD", "python", "-c", "import os; exit(0)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  reminder-network:
    driver: bridge

volumes:
  postgres_data:
    name: postgres-data
  ollama:
    name: ollama-data

secrets:
  nlp_grpc_key:
    file: ./secrets/nlp_grpc_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt