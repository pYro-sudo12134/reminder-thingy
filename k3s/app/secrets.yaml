apiVersion: v1
kind: Secret
metadata:
  name: nlp-service-secrets
  namespace: app
type: Opaque
stringData:
  OPENSEARCH_ADMIN_PASSWORD: "${OPENSEARCH_ADMIN_PASSWORD}"
  NLP_GRPC_API_KEY: "${NLP_GRPC_API_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: dlq-processor-secrets
  namespace: app
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
  SMTP_USERNAME: "${SMTP_USERNAME:-losik2006@gmail.com}"
  SMTP_PASSWORD: "${SMTP_PASSWORD}"
  FROM_EMAIL: "${FROM_EMAIL:-losik2006@gmail.com}"
  NOTIFICATION_EMAIL: "${NOTIFICATION_EMAIL:-losik2006@gmail.com}"
---
apiVersion: v1
kind: Secret
metadata:
  name: reminder-app-secrets
  namespace: app
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
  POSTGRES_USER: "${POSTGRES_USER:-postgres}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  DB_PASSWORD: "${POSTGRES_PASSWORD}"
  OPENSEARCH_ADMIN_PASSWORD: "${OPENSEARCH_ADMIN_PASSWORD}"
  NLP_GRPC_API_KEY: "${NLP_GRPC_API_KEY}"
  SECRET_KEY: "${JWT_SECRET}"
  JWT_SECRET: "${JWT_SECRET}"
  SMTP_USERNAME: "${SMTP_USERNAME:-losik2006@gmail.com}"
  SMTP_PASSWORD: "${SMTP_PASSWORD}"
  FROM_EMAIL: "${FROM_EMAIL:-losik2006@gmail.com}"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: reminder-app-files
  namespace: app
type: Opaque
stringData:
  jwt_secret: "${JWT_SECRET}"
  redis_password: "${REDIS_PASSWORD}"
  aws_access_key: "${AWS_ACCESS_KEY_ID}"
  aws_secret_key: "${AWS_SECRET_ACCESS_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: localstack-secrets
  namespace: cloud
type: Opaque
stringData:
  OPENSEARCH_ADMIN_PASSWORD: "${OPENSEARCH_ADMIN_PASSWORD}"
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
  LOCALSTACK_API_KEY: "${LOCALSTACK_API_KEY:-}"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: database
type: Opaque
stringData:
  POSTGRES_USER: "${POSTGRES_USER:-postgres}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: database
type: Opaque
stringData:
  REDIS_PASSWORD: "${REDIS_PASSWORD}"