apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: "app-rate-limit@kubernetescrd,app-security-headers@kubernetescrd"
    traefik.ingress.kubernetes.io/service.scheme: http
spec:
  ingressClassName: traefik
  rules:
    - host: prometheus.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    - host: grafana.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: cadvisor.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cadvisor
                port:
                  number: 8080
    - host: node-exporter.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: node-exporter
                port:
                  number: 9100