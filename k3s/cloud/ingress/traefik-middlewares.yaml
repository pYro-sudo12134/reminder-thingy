apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: app
spec:
  rateLimit:
    average: 100
    burst: 50
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: app
spec:
  headers:
    sslRedirect: false
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    forceSTSHeader: true
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-network-only
  namespace: app
spec:
  ipWhiteList:
    sourceRange:
      - 10.10.0.0/24      # Базовая сеть
      - 10.42.0.0/16      # k3s pod network
      - 10.43.0.0/16      # k3s service network
      - 192.168.56.0/24   # Vagrant host-only network
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix
  namespace: app
spec:
  stripPrefix:
    prefixes:
      - /api/v1
      - /metrics
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-headers
  namespace: app
spec:
  headers:
    accessControlAllowOriginList: ["*"]
    accessControlAllowMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    accessControlAllowHeaders: ["Content-Type", "X-Amz-Date", "Authorization", "X-Api-Key", "X-Amz-Security-Token"]
    accessControlAllowCredentials: true