apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-ingress
  namespace: app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares:
      - app-rate-limit@kubernetescrd
      - app-security-headers@kubernetescrd
    traefik.ingress.kubernetes.io/service.scheme: http
    traefik.ingress.kubernetes.io/cors-allow-origin: "*"
    traefik.ingress.kubernetes.io/cors-allow-methods: "GET,POST,PUT,DELETE,OPTIONS"
    traefik.ingress.kubernetes.io/cors-allow-headers: "Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token"
    traefik.ingress.kubernetes.io/rate-limit: |
      average: 100
      burst: 50
spec:
  ingressClassName: traefik
  rules:
    - host: api.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: localstack
                port:
                  number: 4566
    - host: app.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reminder-app
                port:
                  number: 8090
    - host: prometheus.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                namespace: monitoring
                port:
                  number: 9090
    - host: grafana.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                namespace: monitoring
                port:
                  number: 3000
    - host: cadvisor.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cadvisor
                namespace: monitoring
                port:
                  number: 8080
    - host: node-exporter.reminder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: node-exporter
                namespace: monitoring
                port:
                  number: 9100