apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: reminder-app-route
  namespace: app
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.reminder.local`)
      services:
        - name: reminder-app
          port: 8090
      middlewares:
        - name: rate-limit
        - name: security-headers
    - kind: Rule
      match: Host(`api.reminder.local`)
      services:
        - name: localstack
          namespace: cloud
          port: 4566
      middlewares:
        - name: cors-headers
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: monitoring-routes
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`prometheus.reminder.local`)
      services:
        - name: prometheus
          port: 9090
    - kind: Rule
      match: Host(`grafana.reminder.local`)
      services:
        - name: grafana
          port: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: nlp-grpc-route
  namespace: app
spec:
  entryPoints:
    - web
  routes:
    - match: HostSNI(`*`)
      services:
        - name: nlp-service
          port: 50051
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: app
spec:
  rateLimit:
    average: 100
    burst: 50
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-headers
  namespace: app
spec:
  headers:
    accessControlAllowOriginList: ["*"]
    accessControlAllowMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    accessControlAllowHeaders: ["Content-Type", "Authorization", "X-Api-Key"]