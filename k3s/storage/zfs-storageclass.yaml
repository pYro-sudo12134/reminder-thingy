apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zfs-local
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: zfs.csi.openebs.io
parameters:
  compressed: "false"
  dedup: "off"
  fstype: "zfs"
  poolname: "data-pool"
  recordsize: "128k"
  thinprovision: "yes"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer