apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nlp-models-pvc
  namespace: app
  labels:
    app: nlp-service
    type: models
    storage: zfs
spec:
  storageClassName: zfs-local
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nlp-data-pvc
  namespace: app
  labels:
    app: nlp-service
    type: data
    storage: zfs
spec:
  storageClassName: zfs-local
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 30Gi
---
