apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-exporter
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "nodes/stats", "nodes/proxy"]
    verbs: ["get", "list"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-exporter
subjects:
  - kind: ServiceAccount
    name: node-exporter-sa
    namespace: monitoring
  - kind: ServiceAccount
    name: cadvisor-sa
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: node-exporter
  apiGroup: rbac.authorization.k8s.io