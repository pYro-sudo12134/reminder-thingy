---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-reminder-app
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: reminder-app
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app: traefik
      ports:
        - port: 8090
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: nlp-service
      ports:
        - port: 8090
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: dlq-processor
      ports:
        - port: 8090
          protocol: TCP

