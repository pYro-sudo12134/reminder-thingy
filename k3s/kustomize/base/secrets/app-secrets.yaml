apiVersion: v1
kind: Secret
metadata:
  name: nlp-service-secrets
  namespace: app
type: Opaque
stringData:
  OPENSEARCH_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
  NLP_GRPC_API_KEY: ${NLP_GRPC_API_KEY}
---
apiVersion: v1
kind: Secret
metadata:
  name: dlq-processor-secrets
  namespace: app
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  FROM_EMAIL: ${FROM_EMAIL}
  NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL}
---
apiVersion: v1
kind: Secret
metadata:
  name: reminder-app-secrets
  namespace: app
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  DB_PASSWORD: ${POSTGRES_PASSWORD}
  OPENSEARCH_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
  NLP_GRPC_API_KEY: ${NLP_GRPC_API_KEY}
  SECRET_KEY: ${JWT_SECRET}
  JWT_SECRET: ${JWT_SECRET}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  FROM_EMAIL: ${FROM_EMAIL}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
---
apiVersion: v1
kind: Secret
metadata:
  name: reminder-app-files
  namespace: app
type: Opaque
stringData:
  jwt_secret: ${JWT_SECRET}
  redis_password: ${REDIS_PASSWORD}
  aws_access_key: ${AWS_ACCESS_KEY_ID}
  aws_secret_key: ${AWS_SECRET_ACCESS_KEY}
---
apiVersion: v1
kind: Secret
metadata:
  name: reminder-app-secrets-dir
  namespace: app
type: Opaque
stringData:
  nlp_grpc_api_key: ${NLP_GRPC_API_KEY}
  postgres_password: ${POSTGRES_PASSWORD}
  redis_password: ${REDIS_PASSWORD}
  jwt_secret: ${JWT_SECRET}
  aws_access_key: ${AWS_ACCESS_KEY_ID}
  aws_secret_key: ${AWS_SECRET_ACCESS_KEY}
---
apiVersion: v1
kind: Secret
metadata:
  name: reminder-app-secrets-json
  namespace: app
type: Opaque
stringData:
  secrets.json: |
    {
      "NLP_GRPC_API_KEY": "${NLP_GRPC_API_KEY}",
      "OPENSEARCH_PASSWORD": "${OPENSEARCH_ADMIN_PASSWORD}",
      "POSTGRES_PASSWORD": "${POSTGRES_PASSWORD}",
      "REDIS_PASSWORD": "${REDIS_PASSWORD}",
      "JWT_SECRET": "${JWT_SECRET}",
      "AWS_ACCESS_KEY_ID": "${AWS_ACCESS_KEY_ID}",
      "AWS_SECRET_ACCESS_KEY": "${AWS_SECRET_ACCESS_KEY}"
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-certs
  namespace: app
type: Opaque
stringData:
  root-ca.pem: ${REDIS_CA_PEM}