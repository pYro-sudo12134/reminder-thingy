apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: monitoring
  labels:
    app: redis-exporter
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
        component: monitoring
    spec:
      serviceAccountName: redis-exporter-sa
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          args:
            - '--redis.addr=redis.database.svc.cluster.local:6379'
            - '--tls-client-key-file=/certs/redis-key.pem'
            - '--tls-client-cert-file=/certs/redis.pem'
            - '--tls-ca-cert-file=/certs/root-ca.pem'
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 9121
              name: metrics
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: certs
          secret:
            secretName: redis-certs