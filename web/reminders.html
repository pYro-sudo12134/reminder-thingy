<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовые напоминания - Мои напоминания</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .nav a {
            flex: 1;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            background: #007bff;
            color: white;
            border-radius: 5px;
        }
        .nav a:hover {
            background: #0056b3;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .hidden {
            display: none;
        }
        .error {
            color: #f44336;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            margin: 10px 0;
        }
        .reminder {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            background: white;
        }
        .reminder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .reminder-id {
            font-size: 12px;
            color: #666;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: white;
            font-weight: bold;
        }
        .reminder-action {
            font-weight: bold;
            margin: 10px 0;
            color: #333;
        }
        .reminder-time {
            color: #555;
            margin: 10px 0;
            font-size: 14px;
            line-height: 1.6;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #007bff;
        }
        .reminder-time strong {
            color: #333;
            font-weight: 600;
        }

        .reminder-time small {
            color: #666;
            font-style: italic;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .delete-btn {
            background: #f44336;
        }
        .delete-btn:hover {
            background: #d32f2f;
        }
        .edit-btn {
            background: #FF9800;
        }
        .edit-btn:hover {
            background: #F57C00;
        }
        .cancel-btn {
            background: #9C27B0;
        }
        .cancel-btn:hover {
            background: #7B1FA2;
        }
        .details-btn {
            background: #2196F3;
        }
        .details-btn:hover {
            background: #1976D2;
        }
        .refresh-btn {
            background: #9c27b0;
        }
        .refresh-btn:hover {
            background: #7b1fa2;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #e9ecef;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            border: 2px dashed #ddd;
            border-radius: 5px;
            margin-top: 20px;
        }
        .autocomplete-container {
            position: relative;
        }
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .autocomplete-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .autocomplete-item:hover {
            background: #f5f5f5;
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-highlight {
            background-color: #fff9c4;
            font-weight: bold;
            padding: 1px 2px;
            border-radius: 2px;
        }
        .clear-btn {
            padding: 10px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        .clear-btn:hover {
            background: #5a6268;
        }
        .autocomplete-info {
            color: #666;
            font-style: italic;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }
        .autocomplete-error {
            color: #f44336;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        .modal.show {
            display: block;
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #666;
        }
        .close:hover {
            color: #333;
        }
        #editForm .form-group {
            margin-bottom: 20px;
            flex-direction: column;
            gap: 5px;
        }
        #editForm label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        #editForm input, #editForm select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        #editForm input:focus, #editForm select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }
        .save-btn {
            background: #4CAF50;
            flex: 2;
        }
        .save-btn:hover {
            background: #45a049;
        }
        .cancel-edit-btn {
            background: #f44336;
            flex: 1;
        }
        .cancel-edit-btn:hover {
            background: #d32f2f;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
<div class="nav">
    <a href="/">Главная</a>
    <a href="/record.html">Запись</a>
    <a href="/reminders.html">Мои напоминания</a>
</div>

<h2 style="text-align: center; color: #333; margin-bottom: 20px;">Мои напоминания</h2>

<div class="form-group">
    <input type="text" id="userId" placeholder="ID загружается..." value="" readonly style="background: #f5f5f5; cursor: not-allowed;">
    <button onclick="loadReminders()">Загрузить</button>
    <button class="refresh-btn" onclick="loadReminders()" title="Обновить">↻</button>
</div>
<div class="form-group autocomplete-container">
    <input type="text" id="reminderText" placeholder="Начните вводить текст напоминания..." autocomplete="off">
    <button class="clear-btn" onclick="clearAutocomplete()" title="Очистить">×</button>
</div>

<div id="stats" class="stats hidden"></div>
<div id="loading" class="loading hidden">Загружаю напоминания...</div>
<div id="error" class="error hidden"></div>
<div id="remindersList"></div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h3 style="margin-bottom: 20px; color: #333;">Редактировать напоминание</h3>
        <form id="editForm" onsubmit="event.preventDefault(); saveReminder();">
            <input type="hidden" id="editReminderId">
            <div class="form-group">
                <label for="editAction">Действие:</label>
                <input type="text" id="editAction" placeholder="Что нужно сделать" required>
            </div>
            <div class="form-group">
                <label for="editScheduledTime">Дата и время:</label>
                <input type="datetime-local" id="editScheduledTime" required>
            </div>
            <div class="form-group">
                <label for="editStatus">Статус:</label>
                <select id="editStatus">
                    <option value="SCHEDULED">Запланировано</option>
                    <option value="COMPLETED">Выполнено</option>
                    <option value="CANCELLED">Отменено</option>
                </select>
            </div>
            <div class="actions">
                <button type="submit" class="save-btn">Сохранить</button>
                <button type="button" class="cancel-edit-btn" onclick="closeEditModal()">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
    let autocompleteDebounceTimer;
    let activeUserId = '';
    let toastTimeout;

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('/api/auth/me');
            if (response.ok) {
                const data = await response.json();
                activeUserId = data.userId;
                localStorage.setItem('userId', data.userId);
                document.getElementById('userId').value = data.userId;
                loadReminders();
                setupAutocomplete('reminderText', data.userId);
            } else {
                const userId = localStorage.getItem('userId');
                if (userId) {
                    document.getElementById('userId').value = userId;
                    activeUserId = userId;
                    loadReminders();
                    setupAutocomplete('reminderText', userId);
                }
            }
        } catch (error) {
            console.error('Error initializing page:', error);
        }
    });

    function loadReminders() {
        console.log('loadReminders called');
        const userId = activeUserId || document.getElementById('userId').value.trim();
        if (!userId) return alert('Пользователь не авторизован');

        activeUserId = userId;
        localStorage.setItem('userId', userId);
        showLoading(true);
        hideError();

        const statusFilter = new URLSearchParams(window.location.search).get('status') || '';

        Promise.all([
            fetch(`/api/reminders/stats/${userId}`).then(r => r.ok ? r.json() : null),
            fetch(`/api/reminders/user/${userId}/reminders?limit=20${statusFilter ? `&status=${statusFilter}` : ''}`).then(r => r.json())
        ]).then(([stats, reminders]) => {
            displayStats(stats);
            displayReminders(reminders);
            showLoading(false);

            setupAutocomplete('reminderText', userId);
        }).catch(error => {
            showError(`Ошибка загрузки: ${error.message}`);
            showLoading(false);
        });
    }

    function loadStats(userId) {
        console.log('loadStats called with userId:', userId);
        if (!userId) return;

        fetch(`/api/reminders/stats/${userId}`)
            .then(r => {
                console.log('Stats response status:', r.status);
                return r.ok ? r.json() : null;
            })
            .then(stats => {
                console.log('Stats data:', stats);
                displayStats(stats);
            })
            .catch(error => {
                console.error('Ошибка загрузки статистики:', error);
            });
    }

    function displayStats(stats) {
        console.log('displayStats called with:', stats);
        const statsDiv = document.getElementById('stats');
        if (!stats || stats.error) {
            statsDiv.classList.add('hidden');
            return;
        }

        statsDiv.innerHTML = Object.entries(stats)
            .filter(([key]) => ['total', 'scheduled', 'completed', 'cancelled'].includes(key))
            .map(([key, value]) => `
                <div class="stat-card">
                    <div class="stat-value">${value}</div>
                    <div class="stat-label">${key === 'total' ? 'Всего' :
                key === 'scheduled' ? 'Запланировано' :
                    key === 'completed' ? 'Выполнено' : 'Отменено'}</div>
                </div>
            `).join('');

        statsDiv.classList.remove('hidden');
    }

    function displayReminders(data) {
        console.log('displayReminders called with:', data);
        const listDiv = document.getElementById('remindersList');

        if (!data.reminders?.length) {
            listDiv.innerHTML = '<div class="empty-state"><p>Напоминаний нет</p><p><a href="/" style="color: #007bff;">Создать первое напоминание</a></p></div>';
            return;
        }

        listDiv.innerHTML = `<h3 style="margin-bottom: 15px;">Напоминания (${data.total})</h3>` +
            data.reminders.map(reminder => {
                const statusColor = {
                    scheduled: '#4CAF50',
                    completed: '#2196F3',
                    cancelled: '#f44336',
                    processing: '#FF9800'
                }[reminder.status.toLowerCase()] || '#9E9E9E';

                const canEdit = reminder.status !== 'COMPLETED' && reminder.status !== 'CANCELLED';

                const scheduledDate = new Date(reminder.scheduledTime);
                const formattedDate = scheduledDate.toLocaleString('ru-RU', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                <div class="reminder" data-id="${reminder.reminderId}">
                    <div class="reminder-header">
                        <span class="reminder-id">ID: ${reminder.reminderId.substring(0, 8)}...</span>
                        <span class="status-badge" style="background: ${statusColor}">${reminder.status}</span>
                    </div>
                    <div class="reminder-action">${reminder.extractedAction || 'Без описания'}</div>
                    <div class="reminder-time">
                        <strong>Когда:</strong> ${formattedDate}<br>
                        <strong>Создано:</strong> ${new Date(reminder.createdAt).toLocaleString('ru-RU')}
                        ${reminder.notificationSent ? '<br><strong>✓ Уведомление отправлено</strong>' : ''}
                    </div>
                    <div class="actions">
                        ${canEdit ? `
                            <button class="edit-btn" onclick="editReminder('${reminder.reminderId}')" title="Редактировать">✎</button>
                            <button class="cancel-btn" onclick="cancelReminder('${reminder.reminderId}')" title="Отменить">✕</button>
                        ` : ''}
                        <button class="delete-btn" onclick="deleteReminder('${reminder.reminderId}')" title="Удалить">🗑</button>
                        <button class="details-btn" onclick="viewDetails('${reminder.reminderId}')" title="Подробности">ℹ</button>
                    </div>
                </div>
            `;
            }).join('');
    }

    function deleteReminder(reminderId) {
        console.log('deleteReminder called with:', reminderId);
        if (!confirm('Удалить это напоминание? Это действие нельзя отменить.')) return;

        showLoading(true);
        fetch(`/api/reminders/reminder/${reminderId}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                console.log('Delete response:', data);
                showLoading(false);
                if (data.deleted) {
                    // Удаляем элемент из DOM
                    const reminderElement = document.querySelector(`.reminder[data-id="${reminderId}"]`);
                    if (reminderElement) {
                        reminderElement.remove();
                    }

                    // Проверяем, остались ли напоминания
                    const remainingReminders = document.querySelectorAll('.reminder').length;
                    console.log('Remaining reminders:', remainingReminders);

                    if (remainingReminders === 0) {
                        document.getElementById('remindersList').innerHTML =
                            '<div class="empty-state"><p>Напоминаний нет</p></div>';
                    }

                    // Обновляем статистику
                    if (activeUserId) {
                        console.log('Calling loadStats with:', activeUserId);
                        loadStats(activeUserId);
                    }
                    showToast('Напоминание удалено');
                } else {
                    showError('Не удалось удалить напоминание');
                }
            })
            .catch(error => {
                console.error('Delete error:', error);
                showLoading(false);
                showError(`Ошибка удаления: ${error.message}`);
            });
    }

    function editReminder(reminderId) {
        console.log('editReminder called with:', reminderId);
        showLoading(true);
        fetch(`/api/reminders/reminder/${reminderId}`)
            .then(r => r.json())
            .then(reminder => {
                console.log('Edit reminder data:', reminder);
                if (reminder.error) {
                    throw new Error(reminder.error);
                }

                document.getElementById('editReminderId').value = reminder.reminderId;
                document.getElementById('editAction').value = reminder.extractedAction || '';

                if (reminder.scheduledTime) {
                    const date = new Date(reminder.scheduledTime);
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    document.getElementById('editScheduledTime').value = `${year}-${month}-${day}T${hours}:${minutes}`;
                }

                document.getElementById('editStatus').value = reminder.status || 'SCHEDULED';
                document.getElementById('editModal').classList.add('show');
                showLoading(false);
            })
            .catch(error => {
                console.error('Edit error:', error);
                showLoading(false);
                showError('Ошибка загрузки данных: ' + error.message);
            });
    }

    function saveReminder() {
        console.log('saveReminder called');
        const reminderId = document.getElementById('editReminderId').value;
        const scheduledTime = document.getElementById('editScheduledTime').value;

        if (!scheduledTime) {
            showError('Выберите дату и время');
            return;
        }

        const data = {
            reminderId: reminderId,
            extractedAction: document.getElementById('editAction').value,
            scheduledTime: scheduledTime + ':00',
            status: document.getElementById('editStatus').value
        };

        console.log('Save data:', data);

        showLoading(true);
        fetch(`/api/reminders/reminder/${reminderId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(r => r.json())
            .then(response => {
                console.log('Save response:', response);
                showLoading(false);
                if (response.updated) {
                    closeEditModal();
                    loadReminders();
                    showToast('Напоминание обновлено');
                } else {
                    showError('Не удалось обновить напоминание');
                }
            })
            .catch(error => {
                console.error('Save error:', error);
                showLoading(false);
                showError('Ошибка: ' + error.message);
            });
    }

    function cancelReminder(reminderId) {
        console.log('cancelReminder called with:', reminderId);
        if (!confirm('Отменить это напоминание? Статус изменится на "Отменено".')) return;

        showLoading(true);
        fetch(`/api/reminders/reminder/${reminderId}/cancel`, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                console.log('Cancel response:', data);
                showLoading(false);
                if (data.cancelled) {
                    loadReminders();
                    showToast('Напоминание отменено');
                } else {
                    showError('Не удалось отменить напоминание');
                }
            })
            .catch(error => {
                console.error('Cancel error:', error);
                showLoading(false);
                showError('Ошибка: ' + error.message);
            });
    }

    function viewDetails(reminderId) {
        console.log('viewDetails called with:', reminderId);
        fetch(`/api/reminders/reminder/${reminderId}`)
            .then(r => r.json())
            .then(data => {
                console.log('Details data:', data);
                if (data.error) return alert(data.error);

                const scheduledDate = new Date(data.scheduledTime);
                const createdDate = new Date(data.createdAt);

                const details = [
                    `ID: ${data.reminderId}`,
                    `Пользователь: ${data.userId}`,
                    `Email: ${data.userEmail || '—'}`,
                    `Действие: ${data.extractedAction || '—'}`,
                    `Оригинальный текст: ${data.originalText || '—'}`,
                    `Запланировано: ${scheduledDate.toLocaleString('ru-RU')}`,
                    `Статус: ${data.status}`,
                    `Создано: ${createdDate.toLocaleString('ru-RU')}`,
                    `Уведомление: ${data.notificationSent ? 'Отправлено' : 'Не отправлено'}`,
                    data.intent ? `🎯 Намерение: ${data.intent}` : null,
                    data.ruleName ? `📅 Правило: ${data.ruleName.substring(0, 20)}...` : null
                ].filter(Boolean).join('\n');

                alert(details);
            })
            .catch(error => {
                console.error('Details error:', error);
                alert('Ошибка загрузки: ' + error.message);
            });
    }

    function closeEditModal() {
        console.log('closeEditModal called');
        document.getElementById('editModal').classList.remove('show');
    }

    function showToast(message) {
        console.log('showToast called with:', message);
        const existingToast = document.querySelector('.toast');
        if (existingToast) {
            existingToast.remove();
            clearTimeout(toastTimeout);
        }

        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);

        toastTimeout = setTimeout(() => {
            toast.remove();
        }, 3000);
    }

    function setupAutocomplete(inputId, userId) {
        console.log('setupAutocomplete called for:', inputId, userId);
        const input = document.getElementById(inputId);
        const container = input.parentNode;
        let dropdown = container.querySelector('.autocomplete-dropdown');

        if (!dropdown) {
            dropdown = document.createElement('div');
            dropdown.className = 'autocomplete-dropdown hidden';
            container.appendChild(dropdown);
        }

        let lastQuery = '';
        const cache = new Map();

        input.addEventListener('input', () => {
            const query = input.value.trim();

            if (query.length < 2) {
                dropdown.classList.add('hidden');
                return;
            }

            clearTimeout(autocompleteDebounceTimer);
            autocompleteDebounceTimer = setTimeout(() => {
                if (query === lastQuery) return;
                lastQuery = query;

                const cacheKey = `${userId}:${query}`;
                if (cache.has(cacheKey)) {
                    renderAutocomplete(cache.get(cacheKey), query, dropdown);
                    return;
                }

                dropdown.innerHTML = '<div class="autocomplete-item">Ищу...</div>';
                dropdown.classList.remove('hidden');

                fetch(`/api/reminders/autocomplete?userId=${encodeURIComponent(userId)}&query=${encodeURIComponent(query)}&limit=5`)
                    .then(r => r.ok ? r.json() : { suggestions: [] })
                    .then(data => {
                        cache.set(cacheKey, data);
                        renderAutocomplete(data, query, dropdown);
                    })
                    .catch(() => {
                        dropdown.innerHTML = '<div class="autocomplete-error">Ошибка поиска</div>';
                        setTimeout(() => dropdown.classList.add('hidden'), 1500);
                    });
            }, 400);
        });

        input.addEventListener('blur', () => {
            setTimeout(() => dropdown.classList.add('hidden'), 200);
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') dropdown.classList.add('hidden');
        });
    }

    function renderAutocomplete(data, query, dropdown) {
        console.log('renderAutocomplete called with query:', query);
        if (!data.suggestions?.length) {
            dropdown.innerHTML = '<div class="autocomplete-info">Ничего не найдено</div>';
            return;
        }

        dropdown.innerHTML = data.suggestions.map(s => {
            const text = s.action || s.text;
            const escapedText = text.replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            })[c]);

            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            const highlighted = escapedText.replace(regex, '<span class="autocomplete-highlight">$1</span>');

            return `
                <div class="autocomplete-item" data-id="${s.reminderId}" data-text="${text.replace(/"/g, '&quot;')}">
                    ${highlighted}
                    <div style="font-size: 12px; color: #666;">ID: ${s.reminderId.substring(0, 8)}...</div>
                </div>
            `;
        }).join('');

        dropdown.querySelectorAll('.autocomplete-item').forEach(el => {
            el.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const id = el.dataset.id;
                const text = el.dataset.text;
                document.getElementById('reminderText').value = text;
                dropdown.classList.add('hidden');
                if (id) viewDetails(id);
            });
        });
    }

    function clearAutocomplete() {
        console.log('clearAutocomplete called');
        const input = document.getElementById('reminderText');
        input.value = '';
        input.focus();
        document.querySelector('.autocomplete-dropdown')?.classList.add('hidden');
    }

    function showLoading(show) {
        document.getElementById('loading').classList.toggle('hidden', !show);
    }

    function showError(message) {
        console.log('showError called with:', message);
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = message;
        errorDiv.classList.remove('hidden');

        setTimeout(() => {
            errorDiv.classList.add('hidden');
        }, 5000);
    }

    function hideError() {
        document.getElementById('error').classList.add('hidden');
    }

    document.getElementById('userId').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadReminders();
    });

    window.addEventListener('click', (e) => {
        const modal = document.getElementById('editModal');
        if (e.target === modal) {
            closeEditModal();
        }
    });

    setInterval(() => {
        if (activeUserId) loadReminders();
    }, 30000);
</script>
</body>
</html>
